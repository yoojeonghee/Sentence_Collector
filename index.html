<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentence Archive</title>
  <link rel="icon" href="favicon.png?v=4" type="image/png">
  <link rel="shortcut icon" href="favicon.png?v=4">
  <link rel="apple-touch-icon" href="favicon.png?v=4">
  <meta name="theme-color" content="#000000">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- 로그인 화면 -->
  <div id="login-screen" class="dark-login">
    <button id="loginThemeToggle" class="login-theme-btn">☀️</button>
    <div class="login-box">
      <img src="logo.png" class="login-logo" />
      <h1 class="login-title">Sentence Archive</h1>
      <p class="login-sub">흩어지는 문장을 모아, 나만의 아카이브로.</p>
      <button id="google-login-btn">
        Google로 시작하기 →
      </button>
      <!-- 🔥 오늘 기록 수 (자동 반영 영역) -->
      <p class="today-count">
        <span class="todayMessage">오늘 아직 기록이 없어요.</span><br/>
        <span class="todaySub">첫 문장을 기다리고 있어요.</span>
      </p>
    </div>
  </div>

  <!-- 앱 화면 -->
  <div id="app-screen" style="display: none;">
    <div class="app">
      <header class="hero">
        <div class="hero-top">
          <div class="brand">
            <img src="logo.png" class="logo" />
            <span class="brand-text">Sentence Archive</span>
          </div>
          <div style="display: flex; gap: 10px; align-items: center;">
            <button id="logoutBtn" style="font-size: 12px; padding: 8px 12px; border-radius: 12px; background: #eee; color: #333;">로그아웃</button>
            <button id="themeToggle" class="theme-toggle">☀️</button>
          </div>
        </div>
        <p class="hero-sub">기록은 순간을 영원으로 바꾸는 가장 조용한 방식입니다.</p>
        <p class="today-count app-today">
          <span class="todayMessage">오늘 아직 기록이 없어요.</span><br/>
          <span class="todaySub">첫 문장을 기다리고 있어요.</span>
        </p>
      </header>

      <!-- 🌿 오늘의 문장 -->
      <div class="daily-sentence-card">
        <div class="daily-header">
          <h2>오늘의 문장</h2>
          <button id="refreshDailyBtn">다른 문장 보기</button>
        </div>

        <div class="daily-content">
          <p id="dailySentenceText">문장을 불러오는 중...</p>
          <small id="dailySentenceMeta"></small>
        </div>
      </div>
      <!-- ============================= -->

      <section class="form-section">
        <input type="text" id="title" placeholder="책 제목" />
        <input type="text" id="author" placeholder="저자" />
        <div id="location-toggle-btn">
          <span>+</span> 위치 입력 추가
        </div>
        <input type="text" id="location" placeholder="위치 (예: 124p, 45%)" style="display: none;">
        <textarea id="content" placeholder="저장할 문장"></textarea>
      </section>

      <div class="search-container">
        <div class="search-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" placeholder="제목, 저자, 문장으로 검색..." />
          <span id="searchClear" class="search-clear"><span>✕</span></span>
        </div>
      </div>

      <section id="cards" class="cards"></section>
    </div>

    <button class="save-btn">저장</button>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
